<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIM - Liquid Final Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060714;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #bc77ff;
            --blue: #70a1ff;
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.45);
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at 50% -20%, #2a1b52, #060714);
            background-attachment: fixed;
            color: #fff; font-family: 'Inter', sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }

        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(6, 7, 20, 0.8);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 8%; display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }

        .logo { 
            font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; 
            background: linear-gradient(to right, var(--blue), var(--accent)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(188, 119, 255, 0.4));
        }

        .container { padding: 120px 8% 60px; max-width: 1400px; margin: auto; }

        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 50px;
            perspective: 1500px;
        }

        .news-card {
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px; overflow: hidden;
            text-decoration: none; color: white;
            display: flex; flex-direction: column;
            position: relative;
            opacity: 0; transform: translateY(40px);
            transition: all 0.6s var(--spring);
            will-change: transform;
        }

        .news-card.show { opacity: 1; transform: translateY(0); }

        .news-card:hover {
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-35px) scale(1.1) rotateX(4deg) rotateY(-4deg) !important;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), 0 0 40px rgba(188, 119, 255, 0.3);
        }

        .news-img-wrapper { width: 100%; height: 230px; overflow: hidden; }
        .news-img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s var(--spring); }
        .news-card:hover .news-img { transform: scale(1.2) rotate(2deg); }

        .news-content { padding: 30px; }
        .news-tag { color: var(--accent); font-size: 0.85rem; font-weight: 800; margin-bottom: 12px; display: block; }
        .news-title { font-size: 1.3rem; font-weight: 700; line-height: 1.45; }

        .btn-container { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 80px 0; gap: 35px; }

        /* --- NÚT SĂN TIN MỚI SIÊU CẤP --- */
        .btn-more {
            background: linear-gradient(45deg, #6a11cb, #2575fc, #6a11cb);
            background-size: 200% auto;
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            padding: 22px 65px; 
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 900; /* Font cực dày */
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.5s var(--spring);
            box-shadow: 0 10px 30px rgba(37, 117, 252, 0.3);
            position: relative;
            outline: none;
        }

        .btn-more:hover {
            transform: scale(1.15) translateY(-8px);
            background-position: right center;
            box-shadow: 0 20px 60px rgba(106, 17, 203, 0.6), 0 0 20px rgba(112, 161, 255, 0.4);
            border-color: white;
            letter-spacing: 6px; /* Giãn chữ khi hover */
        }

        .btn-more:active { transform: scale(0.95); }

        /* Dòng chữ dụ dỗ */
        .signature {
            opacity: 0.5; font-size: 1.1rem; font-weight: 700; text-align: center; 
            cursor: pointer; transition: 0.5s var(--spring);
        }
        .signature:hover {
            opacity: 1; transform: scale(1.2) translateY(-10px);
            background: linear-gradient(90deg, var(--blue), var(--accent), var(--blue));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 2s linear infinite; filter: drop-shadow(0 0 15px var(--accent));
        }
        @keyframes flow { to { background-position: 200% center; } }

        /* MODAL TROLL */
        #troll-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 7, 20, 0.98); display: none; justify-content: center; align-items: center;
            z-index: 2000; backdrop-filter: blur(40px);
        }
        .troll-wrapper {
            max-width: 80%; background: var(--glass); border-radius: 50px; overflow: hidden;
            border: 1px solid var(--glass-border); box-shadow: 0 0 120px rgba(188, 119, 255, 0.3);
            animation: springPop 0.8s var(--spring) forwards;
        }
        @keyframes springPop { 0% { transform: scale(0) rotate(-20deg); } 100% { transform: scale(1) rotate(0); } }
        #troll-img { display: block; max-width: 100%; max-height: 60vh; object-fit: contain; }
        .troll-banner {
            background: rgba(188, 119, 255, 0.15); color: var(--accent); text-align: center;
            padding: 30px; font-weight: 900; font-size: 2rem;
        }
        .close-btn { position: absolute; top: 30px; right: 40px; color: #fff; font-size: 4rem; cursor: pointer; opacity: 0.5; }
    </style>
</head>
<body>

<nav>
    <div class="logo">CHIM</div>
    <div id="time" style="font-weight: 900; color: var(--blue);"></div>
</nav>

<div class="container">
    <div id="news-grid"></div>
    <div class="btn-container">
        <button class="btn-more" id="load-more-btn" onclick="fetchNews()">Săn thêm tin mới</button>
        <div class="signature" onclick="openTroll()">
            Tung Tung Sahur Tha Lỗi Cho Em Nha , Bấm Vô Dòng Này Để Xem Ảnh Nóng 😎😎😎🤑🤑🤑🤑
        </div>
    </div>
</div>

<div id="troll-modal" onclick="closeTroll()">
    <div class="troll-wrapper" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeTroll()">&times;</span>
        <img id="troll-img" src="troll.jpg" alt="meme hài">
        <div class="troll-banner">Tung Tung Tung Sahurrr 😎😎😎💩💩</div>
    </div>
</div>

<script>
    let displayedLinks = new Set();
    const categories = ['tin-moi-nhat', 'the-gioi', 'thoi-su', 'so-hoa', 'giai-tri', 'the-thao'];
    let catIndex = 0;

    function openTroll() { document.getElementById('troll-modal').style.display = 'flex'; }
    function closeTroll() { document.getElementById('troll-modal').style.display = 'none'; }

    setInterval(() => {
        document.getElementById('time').innerText = new Date().toLocaleTimeString('vi-VN');
    }, 1000);

    async function fetchNews() {
        const btn = document.getElementById('load-more-btn');
        const oldText = btn.innerText;
        btn.innerText = "CHIM ĐANG BAY...";
        const cat = categories[catIndex % categories.length];
        catIndex++;
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://vnexpress.net/rss/'+cat+'.rss')}&t=${Date.now()}`;

        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            if (data.status === 'ok') {
                const newItems = data.items.filter(item => !displayedLinks.has(item.link));
                render(newItems.slice(0, 6));
            }
        } catch (e) { btn.innerText = "LỖI KẾT NỐI"; }
        finally { btn.innerText = oldText; }
    }

    function render(items) {
        const grid = document.getElementById('news-grid');
        items.forEach((item, index) => {
            displayedLinks.add(item.link);
            let imgMatch = item.description.match(/src="([^"]+)"/);
            let img = imgMatch ? imgMatch[1] : 'https://images.unsplash.com/photo-1504711432819-08479a55d8d4?w=500';
            const card = document.createElement('a');
            card.href = item.link; card.target = "_blank"; card.className = 'news-card';
            card.innerHTML = `<div class="news-img-wrapper"><img src="${img}" class="news-img"></div><div class="news-content"><span class="news-tag">#${item.categories[0] || 'HOT'}</span><div class="news-title">${item.title}</div></div>`;
            grid.appendChild(card);
            setTimeout(() => card.classList.add('show'), index * 100);
        });
    }
    fetchNews();
</script>
</body>
</html>
