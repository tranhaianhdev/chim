<style>
  body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding-top: 20%; }
  .loader { border: 5px solid #333; border-top: 5px solid #0f0; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<div id="content">
  <h1>ĐANG KẾT NỐI VỚI SERVER CỦA HANCA...</h1>
  <div class="loader"></div>
  <p id="status">Đang tải dữ liệu... [10%]</p>
</div>

<script>
  let percent = 10;
  let status = document.getElementById('status');
  setInterval(() => {
    if(percent < 100) {
      percent += 1;
      status.innerText = `Đang tải dữ liệu... [${percent}%]`;
    } else {
      document.body.innerHTML = "<h1 style='color:red;'>HACKED BY HANCA-BOT!</h1><p>Hệ thống của bạn đã bị kiểm soát.</p>";
    }
  }, 100);
</script>
