<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Pro Max</title>
    <style>
        body {
            margin: 0; background: #050505; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }
        canvas {
            background: #111; border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 255, 150, 0.2);
            max-width: 95vw; max-height: 50vh;
        }
        .ui { margin-bottom: 20px; text-align: center; }
        .score { font-size: 32px; font-weight: 900; color: #00ff96; text-shadow: 0 0 15px #00ff96; }
        
        /* Bộ nút điều khiển cực nhạy */
        .dpad {
            display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; margin-top: 30px;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0, 255, 150, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #00ff96; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #00ff96; color: #000; transform: scale(0.9); }
    </style>
</head>
<body>

<div class="ui">
    <div class="score" id="score">0</div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="dpad">
    <div style="grid-column: 2" class="btn" id="up">▲</div>
    <div style="grid-column: 1" class="btn" id="left">◀</div>
    <div style="grid-column: 2" class="btn" id="down">▼</div>
    <div style="grid-column: 3" class="btn" id="right">▶</div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    const GRID_SIZE = 20;
    const TILE_COUNT = 20;
    canvas.width = canvas.height = GRID_SIZE * TILE_COUNT;

    let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
    let food = {x: 5, y: 5};
    let dx = 0, dy = -1;
    let nextDx = 0, nextDy = -1;
    let score = 0;
    let lastTime = 0;
    let moveTimer = 0;
    const moveInterval = 120; // Tốc độ di chuyển (ms)

    // Xử lý điều khiển
    const input = (dir) => {
        if (dir === 'UP' && dy === 0) { nextDx = 0; nextDy = -1; }
        if (dir === 'DOWN' && dy === 0) { nextDx = 0; nextDy = 1; }
        if (dir === 'LEFT' && dx === 0) { nextDx = -1; nextDy = 0; }
        if (dir === 'RIGHT' && dx === 0) { nextDx = 1; nextDy = 0; }
    };

    document.getElementById('up').ontouchstart = () => input('UP');
    document.getElementById('down').ontouchstart = () => input('DOWN');
    document.getElementById('left').ontouchstart = () => input('LEFT');
    document.getElementById('right').ontouchstart = () => input('RIGHT');
    
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp') input('UP');
        if (e.key === 'ArrowDown') input('DOWN');
        if (e.key === 'ArrowLeft') input('LEFT');
        if (e.key === 'ArrowRight') input('RIGHT');
    });

    function update(time) {
        const dt = time - lastTime;
        lastTime = time;
        moveTimer += dt;

        if (moveTimer > moveInterval) {
            moveTimer = 0;
            dx = nextDx; dy = nextDy;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Va chạm tường hoặc thân
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT || 
                snake.some((s, i) => i !== 0 && s.x === head.x && s.y === head.y)) {
                alert("GAME OVER! Điểm: " + score);
                location.reload();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        draw(moveTimer / moveInterval);
        requestAnimationFrame(update);
    }

    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * TILE_COUNT),
            y: Math.floor(Math.random() * TILE_COUNT)
        };
    }

    function draw(lerp) {
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vẽ lưới mờ
        ctx.strokeStyle = "#222";
        for(let i=0; i<canvas.width; i+=GRID_SIZE) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // Vẽ thức ăn (Animation nhấp nháy)
        ctx.fillStyle = "#ff0055";
        ctx.shadowBlur = 15; ctx.shadowColor = "#ff0055";
        ctx.beginPath();
        ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Vẽ rắn (Smooth Animation)
        snake.forEach((part, i) => {
            ctx.fillStyle = i === 0 ? "#00ff96" : "#00aa66";
            // Vẽ bo góc tròn
            ctx.beginPath();
            ctx.roundRect(part.x * GRID_SIZE + 2, part.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4, 5);
            ctx.fill();
        });
    }

    spawnFood();
    requestAnimationFrame(update);
</script>
</body>
</html>
